    <!-- 1. Loader साठी CSS -->
    <style>
        /* पूर्ण स्क्रीन कव्हर करण्यासाठी आणि मध्यभागी आणण्यासाठी */
        .initial-loader-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); /* तुमच्या ॲपचा बॅकग्राऊंड कलर */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
        }

        /* 3 Dots Container */
        .bouncing-dots {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

            /* Dots Styling and Animation */
            .bouncing-dots div {
                width: 18px;
                height: 18px;
                border-radius: 50%;
                background: #3b82f6; /* Blue Color */
                animation: bounceLoader 0.6s infinite alternate;
            }

                .bouncing-dots div:nth-child(2) {
                    background: #8b5cf6; /* Purple Color */
                    animation-delay: 0.2s;
                }

                .bouncing-dots div:nth-child(3) {
                    background: #20c997; /* Green Color */
                    animation-delay: 0.4s;
                }

        @@keyframes bounceLoader {
            to {
                transform: translateY(-18px);
            }
        }

        /* Loading Text Animation */
        .loading-text {
            color: #334155;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            animation: pulseText 1.5s infinite;
        }

        @@keyframes pulseText {
            0%, 100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }
    </style>

    <!-- ============================= -->
    <!-- 🔥 PWA INSTALL SCRIPT -->
    <!-- ============================= -->
    <script>
        let deferredPrompt;
        const banner = document.getElementById('install-banner');
        const installBtn = document.getElementById('install-btn');
        const closeBtn = document.getElementById('close-btn');
        const installText = document.getElementById('install-text');

        const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

        // ✅ Already closed
        if (localStorage.getItem("pwaClosed") === "true") {
            banner.style.display = "none";
        }

        // ✅ Already installed
        if (isStandalone) {
            banner.style.display = "none";
        }

        // ✅ iOS fallback
        if (isIos && !isStandalone) {
            banner.style.display = "block";
            installBtn.style.display = "none";

            installText.innerHTML =
                "📱 Tap Share ⬆️<br>Then Add to Home Screen";
        }

        // ✅ Android install event
        window.addEventListener('beforeinstallprompt', (e) => {
            console.log("🔥 INSTALL READY");

            e.preventDefault();
            deferredPrompt = e;

            banner.style.display = "block";
        });

        // ✅ Install click
        installBtn.addEventListener('click', async () => {

            if (!deferredPrompt) {
                alert("Install not available yet");
                return;
            }

            deferredPrompt.prompt();

            const result = await deferredPrompt.userChoice;

            if (result.outcome === 'accepted') {
                console.log("✅ Installed");
            } else {
                console.log("❌ Cancelled");
            }

            deferredPrompt = null;
            banner.style.display = "none";
        });

        // ✅ Close
        closeBtn.addEventListener('click', () => {
            banner.style.display = "none";
            localStorage.setItem("pwaClosed", "true");
        });
    </script>

    <!-- GEOLOCATION -->
    <!-- ============================= -->
    <script>
        // Call the function
        window.getGeoLocation = () => {
            return new Promise((resolve, reject) => {
                // Check if browser supports Geolocation
                if (!navigator.geolocation) {
                    reject("Geolocation is not supported by your browser");
                    return;
                }

                // 1. THESE ARE THE KEY SETTINGS FROM YOUR HTML CODE
                const options = {
                    enableHighAccuracy: true, // Forces GPS usage
                    timeout: 10000,           // Waits up to 10 seconds
                    maximumAge: 0             // Forces a fresh reading (no cache)
                };

                // 2. Call getCurrentPosition with the options
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        // Success: Resolve with coordinates and accuracy
                        resolve({
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        });
                    },
                    (error) => {
                        // Error: Reject with message
                        reject(error.message);
                    },
                    options // <--- IMPORTANT: This must be passed here
                );
            });
        };
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let newWorker;
            let refreshing = false;

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' })
                    .then(reg => {

                        // १. जर ॲप उघडल्या उघडल्या आधीच एखादा अपडेट Waiting मध्ये असेल, तर लगेच बॅनर दाखवा
                        if (reg.waiting) {
                            newWorker = reg.waiting;
                            console.log("✅ Update is already waiting!");
                            document.getElementById('update-banner').style.display = 'block';
                        }

                        // २. रेग्युलर चेक (दर १० सेकंदाने)
                        setInterval(() => {
                            console.log("🔄 Checking for update...");
                            reg.update();
                        }, 10000);

                        // ३. जर ॲप चालू असताना नवीन अपडेट आले, तर बॅनर दाखवा
                        reg.addEventListener('updatefound', () => {
                            newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log("✅ New update available & downloaded");
                                    document.getElementById('update-banner').style.display = 'block';
                                }
                            });
                        });
                    });

                // ४. Update बटनावर क्लिक केल्यावर काय होईल?
                const updateBtn = document.getElementById('update-btn');
                if (updateBtn) {
                    updateBtn.addEventListener('click', () => {
                        console.log("🔥 Update button clicked");
                        updateBtn.innerText = "Updating...";
                        updateBtn.disabled = true;
                        document.getElementById('update-banner').style.display = 'none';

                        if (!newWorker) {
                            window.location.reload(true);
                            return;
                        }

                        // नवीन वर्करला सांगणे: "आता जुना कोड फेकून दे आणि नवीन चालू कर"
                        newWorker.postMessage({ action: 'skipWaiting' });
                    });
                }

                // ५. नवीन वर्कर ऍक्टिव्हेट झाल्यावर पेज ऑटोमॅटिक रिफ्रेश करा
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (refreshing) return;
                    refreshing = true;
                    console.log("♻️ Reloading with new version");
                    window.location.reload();
                });
            }
        });
    </script>
    <script>
        window.downloadFile = function (fileName, contentType, base64) {
            const link = document.createElement('a');
            link.download = fileName;
            link.href = `data:${contentType};base64,${base64}`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
    <script>
        window.startVideo = async () => {
            try {
                const video = document.getElementById('videoFeed');
                if (!video) {
                    console.error("व्हिडिओ टॅग सापडला नाही.");
                    return;
                }

                // 1. सिक्युरिटी चेक (HTTP vs HTTPS)
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert("तुमचा ब्राउझर कॅमेराला सपोर्ट करत नाही. कृपया खात्री करा की तुम्ही 'https://' किंवा 'localhost' वापरत आहात.");
                    return;
                }

                // 2. कॅमेराची Permission मागा (येथे ब्राउझर युजरला Allow/Block विचारेल)
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" } // फ्रंट कॅमेरा (सेल्फी) सुरु करण्यासाठी
                });

                // 3. व्हिडिओ टॅगला कॅमेरा फीड जोडा
                video.srcObject = stream;

                // 4. ब्लॅक स्क्रीन टाळण्यासाठी मॅन्युअली प्ले करा
                await video.play();

            } catch (err) {
                console.error("Camera Error: ", err);
                if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
                    alert("कॅमेराची परवानगी (Permission) नाकारली गेली आहे! कृपया ब्राउझरच्या URL बार मधील 🔒 (Lock) आयकॉनवर क्लिक करा आणि कॅमेरा 'Allow' करा.");
                } else {
                    alert("कॅमेरा चालू होऊ शकला नाही. दुसरा कुठलातरी ॲप कॅमेरा वापरत नाहीये ना ते तपासा.");
                }
            }
        };

        window.capturePhoto = () => {
            const video = document.getElementById('videoFeed');
            const canvas = document.getElementById('canvas');

            if (!video || !video.srcObject) {
                alert("कॅमेरा चालू झालेला नाही. कृपया थोडा वेळ वाट पाहा किंवा पेज रिफ्रेश करा.");
                return null;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

            // फोटो बेस64 मध्ये कन्व्हर्ट करून रिटर्न करा
            return canvas.toDataURL('image/jpeg', 0.8);
        };
    </script>
    <script>
        window.stopVideo = () => {
            const video = document.getElementById('videoFeed');

            if (video && video.srcObject) {
                const stream = video.srcObject;

                // Stop all tracks (camera OFF)
                stream.getTracks().forEach(track => track.stop());

                // Remove stream reference
                video.srcObject = null;
            }
        };
    </script>
    <script>
        window.forceAppUpdate = async () => {

            console.log("🔥 Manual refresh triggered");

            // 🔥 Clear all caches
            if ('caches' in window) {
                const keys = await caches.keys();
                await Promise.all(keys.map(key => caches.delete(key)));
            }

            // 🔥 Unregister service worker
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let reg of registrations) {
                    await reg.unregister();
                }
            }

            // 🔥 Hard reload (no cache)
            window.location.reload(true);
        };
    </script>
