name: Build Website

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-website:
    runs-on: ubuntu-22.04

    container:
      image: mcr.microsoft.com/dotnet/sdk:9.0

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify .NET version
        run: dotnet --version

      - name: Restore
        run: dotnet restore "Server/SMART HRMS SYSTEM.Server.csproj"

      - name: Publish Website
        run: |
          dotnet publish "Server/SMART HRMS SYSTEM.Server.csproj" \
            -c Release \
            -o ./website-output

      - name: Zip Website
        run: |
          apt-get update -qq && apt-get install -y zip -qq
          cd website-output
          zip -r ../OneHR-Website-Deploy.zip .

      - name: Upload Website
        uses: actions/upload-artifact@v4
        with:
          name: OneHR-Website-v${{ github.run_number }}
          path: OneHR-Website-Deploy.zip
          retention-days: 30
