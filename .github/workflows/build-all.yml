name: Build Android APK + Website

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:

  # ── Android APK ────────────────────────────────────────────────────────────
  build-android:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install android maui-android --skip-sign-check

      - name: Build Android APK
        run: |
          dotnet publish MauiApp/MauiApp.csproj `
            -f net9.0-android `
            -c Release `
            -o ./android-output `
            -p:AndroidKeyStore=false

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: SpOneHR-Android-${{ github.run_number }}
          path: |
            android-output/*.apk
            MauiApp/bin/Release/net9.0-android/*.apk
          retention-days: 30

  # ── iOS IPA ────────────────────────────────────────────────────────────────
  build-ios:
    runs-on: macos-15
    env:
      DOTNET_MULTILEVEL_LOOKUP: 0
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI iOS workload
        run: dotnet workload install maui --skip-manifest-update --skip-sign-check

      - name: Build iOS App
        run: |
          dotnet publish MauiApp/MauiApp.csproj \
            -f net9.0-ios \
            -c Release \
            -r ios-arm64 \
            -p:BuildIpa=false \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -o ./ios-output

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: SpOneHR-iOS-${{ github.run_number }}
          path: |
            ios-output/**/*.app
            MauiApp/bin/Release/net9.0-ios/ios-arm64/**/*.app
          if-no-files-found: warn
          retention-days: 30

  # ── Website ────────────────────────────────────────────────────────────────
  build-website:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build & Publish Website
        run: |
          dotnet publish "Server/SMART HRMS SYSTEM.Server.csproj" `
            -c Release `
            -o ./website-output

      - name: Upload Website
        uses: actions/upload-artifact@v4
        with:
          name: OneHR-Website-${{ github.run_number }}
          path: website-output/
          retention-days: 30
