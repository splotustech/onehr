name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    # macOS is REQUIRED — iOS workload only runs on macOS
    runs-on: macos-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # macOS supports BOTH android and ios workloads.
      # We need android here because MauiApp.csproj declares
      # net9.0-android in TargetFrameworks — dotnet restore
      # checks all targets even when we only publish for iOS.
      - name: Install workloads (iOS + Android — both supported on macOS)
        run: |
          dotnet workload install ios android maui-ios maui-android \
            --skip-sign-check

      # Pass TargetFramework to skip restoring Android SDK packages
      - name: Restore iOS only
        run: |
          dotnet restore MauiApp/MauiApp.csproj \
            -p:TargetFramework=net9.0-ios

      - name: Build iOS IPA
        run: |
          dotnet publish MauiApp/MauiApp.csproj \
            -f net9.0-ios \
            -c Release \
            -r ios-arm64 \
            -p:BuildIpa=true \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -o ./ios-output

      - name: Find IPA
        run: |
          echo "=== IPA files ==="
          find . -name "*.ipa" 2>/dev/null || echo "No .ipa found"
          echo "=== App bundles ==="
          find . -name "*.app" -maxdepth 10 2>/dev/null | head -5

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SpOneHR-iOS-v${{ github.run_number }}
          path: |
            ios-output/*.ipa
            ios-output/**/*.ipa
            MauiApp/bin/Release/net9.0-ios/**/*.ipa
          if-no-files-found: warn
          retention-days: 30
