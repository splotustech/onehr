name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    env:
      DOTNET_MULTILEVEL_LOOKUP: 0

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # Install .NET 9 in the 9.0.1xx feature band (Feb 2025 era).
      # global.json latestFeature rollforward picks this up correctly.
      # This era uses iOS SDK 18.x — compatible with Xcode 16.4 on macos-15.
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.1xx'

      - name: Verify .NET and Xcode versions
        run: |
          dotnet --version
          xcodebuild -version

      # Install full MAUI workload — satisfies BOTH maui-ios AND maui-android.
      # MAUI projects always need maui-android even when building iOS only.
      # --skip-manifest-update: uses the manifest bundled with the installed SDK
      # (iOS 18.x workload) instead of downloading the latest (iOS 26.5.9002
      # which needs Xcode 26.5 — not available on this runner).
      - name: Install MAUI workload
        run: |
          dotnet workload install maui \
            --skip-manifest-update \
            --skip-sign-check

      - name: Restore iOS only
        run: |
          dotnet restore MauiApp/MauiApp.csproj \
            -p:TargetFramework=net9.0-ios

      - name: Build iOS IPA
        run: |
          dotnet publish MauiApp/MauiApp.csproj \
            -f net9.0-ios \
            -c Release \
            -r ios-arm64 \
            -p:BuildIpa=true \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -o ./ios-output

      - name: Find IPA
        run: find . -name "*.ipa" 2>/dev/null || echo "No IPA found"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SpOneHR-iOS-v${{ github.run_number }}
          path: |
            ios-output/*.ipa
            ios-output/**/*.ipa
            MauiApp/bin/Release/net9.0-ios/**/*.ipa
          if-no-files-found: warn
          retention-days: 30
