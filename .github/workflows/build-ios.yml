name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    # macos-15 = macOS 15 (Sequoia) with Xcode 16.x stable
    # DO NOT use macos-latest — it is now macOS 26 (beta) which has
    # .NET 10 pre-installed and requires Xcode 26.5 (not yet stable).
    runs-on: macos-15

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # Install .NET 9 and force it as the active SDK.
      # Pin to 9.0.x — macos-15 does not pre-install .NET 10,
      # so this avoids the iOS SDK 26.5 / Xcode 26.5 mismatch.
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Show SDK and Xcode versions
        run: |
          echo "=== .NET SDK ==="
          dotnet --version
          echo "=== Xcode ==="
          xcode-select -p
          xcodebuild -version

      # macOS supports both ios and android workloads.
      # android is needed because MauiApp.csproj declares
      # net9.0-android in TargetFrameworks.
      - name: Install MAUI workloads
        run: |
          dotnet workload install ios android maui-ios maui-android \
            --skip-sign-check

      # Restore only the iOS target — skips android SDK download
      - name: Restore (iOS only)
        run: |
          dotnet restore MauiApp/MauiApp.csproj \
            -p:TargetFramework=net9.0-ios

      - name: Build iOS IPA
        run: |
          dotnet publish MauiApp/MauiApp.csproj \
            -f net9.0-ios \
            -c Release \
            -r ios-arm64 \
            -p:BuildIpa=true \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -o ./ios-output

      - name: Find IPA
        run: |
          echo "=== IPA files ==="
          find . -name "*.ipa" 2>/dev/null || echo "No .ipa found"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SpOneHR-iOS-v${{ github.run_number }}
          path: |
            ios-output/*.ipa
            ios-output/**/*.ipa
            MauiApp/bin/Release/net9.0-ios/**/*.ipa
          if-no-files-found: warn
          retention-days: 30
