name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    env:
      # Prevent dotnet from finding .NET 10 in other locations
      DOTNET_MULTILEVEL_LOOKUP: 0
      # Prevent dotnet from using the latest rollforward (stay on .NET 9)
      DOTNET_ROLL_FORWARD: Disable

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # Install the EXACT .NET 9.0.100 GA release (November 2024).
      # This SDK ships with iOS 18.0 workload which requires Xcode 16.0+.
      # The runner has Xcode 16.4 — compatible.
      # We must NOT use a later .NET 9 patch because Apple updated the
      # iOS workload to 26.5.9002 (requiring Xcode 26.5) in mid-2025.
      - name: Setup .NET 9.0.100
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.100'

      - name: Verify .NET 9 is active
        run: |
          echo "=== SDK version ==="
          dotnet --version
          echo "=== Xcode version ==="
          xcodebuild -version

      # --skip-manifest-update is CRITICAL:
      # Without it, dotnet downloads the latest workload manifest which
      # points to iOS SDK 26.5 (Xcode 26.5 required).
      # With it, dotnet uses the manifest BUNDLED in .NET 9.0.100 SDK
      # which points to iOS SDK 18.0 (Xcode 16.0+ compatible).
      - name: Install iOS workload (using bundled manifest only)
        run: |
          dotnet workload install ios android \
            --skip-manifest-update \
            --skip-sign-check

      # Restore only iOS target to skip android SDK download
      - name: Restore iOS only
        run: |
          dotnet restore MauiApp/MauiApp.csproj \
            -p:TargetFramework=net9.0-ios

      - name: Build iOS IPA
        run: |
          dotnet publish MauiApp/MauiApp.csproj \
            -f net9.0-ios \
            -c Release \
            -r ios-arm64 \
            -p:BuildIpa=true \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -o ./ios-output

      - name: Find IPA
        run: find . -name "*.ipa" 2>/dev/null || echo "No IPA found"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SpOneHR-iOS-v${{ github.run_number }}
          path: |
            ios-output/*.ipa
            ios-output/**/*.ipa
            MauiApp/bin/Release/net9.0-ios/**/*.ipa
          if-no-files-found: warn
          retention-days: 30
