name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    env:
      DOTNET_MULTILEVEL_LOOKUP: 0

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # Install latest .NET 9 patch (9.0.x). The bundled workload manifest in
      # the latest 9.0 SDK is compatible with MAUI 9.0.60 (9.0.300 feature band).
      # Pinning to 9.0.1xx caused an SDK band mismatch: that band only knows MAUI
      # up to ~9.0.10, so restoring 9.0.60 packages broke MSBuild targets.
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Verify .NET and Xcode versions
        run: |
          dotnet --version
          xcodebuild -version

      # Install full MAUI workload — satisfies BOTH maui-ios AND maui-android.
      # MAUI projects always need maui-android even when building iOS only.
      # --skip-manifest-update: uses the manifest bundled with the installed SDK
      # (iOS 18.x workload) instead of downloading the latest (iOS 26.5.9002
      # which needs Xcode 26.5 — not available on this runner).
      - name: Install MAUI workload
        run: |
          dotnet workload install maui \
            --skip-manifest-update \
            --skip-sign-check

      - name: Restore iOS only
        run: |
          dotnet restore MauiApp/MauiApp.csproj \
            -p:TargetFramework=net9.0-ios

      - name: Build iOS App
        run: |
          dotnet publish MauiApp/MauiApp.csproj \
            -f net9.0-ios \
            -c Release \
            -r ios-arm64 \
            -p:BuildIpa=false \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -o ./ios-output

      - name: Find App bundle
        run: find . -name "*.app" -type d 2>/dev/null || echo "No .app found"

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: SpOneHR-iOS-v${{ github.run_number }}
          path: |
            ios-output/**/*.app
            MauiApp/bin/Release/net9.0-ios/ios-arm64/**/*.app
          if-no-files-found: warn
          retention-days: 30
