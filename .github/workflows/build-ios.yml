name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    env:
      DOTNET_MULTILEVEL_LOOKUP: 0

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # Use latest .NET 9 patch — its bundled workload manifest matches MAUI 9.0.60.
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Verify .NET and Xcode versions
        run: |
          dotnet --version
          xcodebuild -version

      # --skip-manifest-update: use the manifest bundled with the installed SDK
      # instead of downloading a newer one that may require a newer Xcode.
      - name: Install MAUI workload
        run: |
          dotnet workload install maui \
            --skip-manifest-update \
            --skip-sign-check

      - name: Restore iOS only
        run: |
          dotnet restore MauiApp/MauiApp.csproj \
            -p:TargetFramework=net9.0-ios

      # Build for iOS Simulator (iossimulator-x64) — no Apple code-signing
      # certificates required, reliable in CI.
      # NOTE: use `dotnet build`, NOT `dotnet publish`. The iOS SDK's publish
      # target only accepts a device architecture (ios-arm64); a simulator RID
      # cannot be published. For a real device IPA, set up an Apple P12 cert +
      # provisioning profile as GitHub secrets and switch to:
      #   dotnet publish -f net9.0-ios -r ios-arm64 -c Release -p:BuildIpa=true
      - name: Build iOS App (Simulator)
        run: |
          dotnet build MauiApp/MauiApp.csproj \
            -f net9.0-ios \
            -r iossimulator-x64 \
            -c Release

      - name: Find App bundle
        run: find . -name "*.app" -type d 2>/dev/null || echo "No .app bundle found"

      - name: Upload iOS Simulator App
        uses: actions/upload-artifact@v4
        with:
          name: SpOneHR-iOS-Simulator-v${{ github.run_number }}
          path: |
            MauiApp/bin/Release/net9.0-ios/iossimulator-x64/**/*.app
          if-no-files-found: warn
          retention-days: 30
