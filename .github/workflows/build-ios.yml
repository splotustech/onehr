name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15

    env:
      # Prevent dotnet from finding pre-installed .NET 10 on the runner.
      # With global.json pinning .NET 9, this ensures .NET 9 is used.
      DOTNET_MULTILEVEL_LOOKUP: 0

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          global-json-file: global.json

      - name: Verify .NET 9 is active
        run: |
          dotnet --version
          echo "SDK must start with 9. — if it shows 10.x, the fix failed."

      - name: Install MAUI workloads
        run: |
          dotnet workload install ios android maui-ios maui-android \
            --skip-sign-check

      - name: Restore iOS only
        run: |
          dotnet restore MauiApp/MauiApp.csproj \
            -p:TargetFramework=net9.0-ios

      - name: Build iOS IPA
        run: |
          dotnet publish MauiApp/MauiApp.csproj \
            -f net9.0-ios \
            -c Release \
            -r ios-arm64 \
            -p:BuildIpa=true \
            -p:EnableCodeSigning=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -o ./ios-output

      - name: Find IPA
        run: find . -name "*.ipa" 2>/dev/null || echo "No IPA found"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SpOneHR-iOS-v${{ github.run_number }}
          path: |
            ios-output/*.ipa
            ios-output/**/*.ipa
            MauiApp/bin/Release/net9.0-ios/**/*.ipa
          if-no-files-found: warn
          retention-days: 30
