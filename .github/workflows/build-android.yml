name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    # Use official .NET 9 SDK Docker image — contains ONLY .NET 9.
    # This completely avoids the .NET 10 pre-installed on the runner.
    container:
      image: mcr.microsoft.com/dotnet/sdk:9.0

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify .NET version (must be 9.x)
        run: dotnet --version

      # android workload is supported on Linux
      - name: Install Android workload
        run: dotnet workload install android --skip-sign-check

      # Restore only Android target — avoids needing ios workload on Linux
      - name: Restore Android only
        run: |
          dotnet restore MauiApp/MauiApp.csproj \
            -p:TargetFramework=net9.0-android

      - name: Build Android APK
        run: |
          dotnet publish MauiApp/MauiApp.csproj \
            -f net9.0-android \
            -c Release \
            -o ./android-output

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null | head -10

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpOneHR-Android-v${{ github.run_number }}
          path: |
            android-output/*.apk
            MauiApp/bin/Release/net9.0-android/*.apk
          retention-days: 30
