name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    # ubuntu-22.04 = stable Linux runner with known .NET environment
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Show .NET version
        run: dotnet --version

      # Linux only supports android workloads — ios is macOS only
      - name: Install Android workloads
        run: |
          dotnet workload install android maui-android --skip-sign-check

      # Restore only Android target — avoids ios workload requirement
      - name: Restore (Android only)
        run: |
          dotnet restore MauiApp/MauiApp.csproj \
            -p:TargetFramework=net9.0-android

      - name: Build Android APK
        run: |
          dotnet publish MauiApp/MauiApp.csproj \
            -f net9.0-android \
            -c Release \
            -o ./android-output

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null | head -10

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpOneHR-Android-v${{ github.run_number }}
          path: |
            android-output/*.apk
            MauiApp/bin/Release/net9.0-android/*.apk
          retention-days: 30
