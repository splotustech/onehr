        .initial-loader-wrapper {

            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); /* à¤¤à¥à¤®à¤šà¥à¤¯à¤¾ à¥²à¤ªà¤šà¤¾ à¤¬à¥…à¤•à¤—à¥à¤°à¤¾à¤Šà¤‚à¤¡ à¤•à¤²à¤° */

    <script>
        (function () {
            var deferredPrompt = null;
            var banner      = document.getElementById('install-banner');
            var installBtn  = document.getElementById('install-btn');
            var closeBtn    = document.getElementById('close-btn');
            var installText = document.getElementById('install-text');
            if (!banner) return;
            var ua = navigator.userAgent.toLowerCase();
            var isIosDev = /iphone|ipad|ipod/.test(ua);
            var isSafariBrowser = /safari/.test(ua) && !/chrome|crios|fxios/.test(ua);
            var isStandaloneMode = (window.navigator.standalone === true) || window.matchMedia('(display-mode: standalone)').matches;
            if (isStandaloneMode) return;
            if (localStorage.getItem('pwaClosed') === 'true') return;
            if (isIosDev && isSafariBrowser) {
                installText.innerHTML = '<strong>To install ONE HR on iPhone / iPad:</strong><br>' +
                    '1. Tap the <strong>Share</strong> button at the bottom of Safari<br>' +
                    '2. Scroll down and tap <strong>&#34;Add to Home Screen&#34;</strong><br>' +
                    '3. Tap <strong>&#34;Add&#34;</strong>';
                installBtn.style.display = 'none';
                banner.style.display = 'block';
                closeBtn.addEventListener('click', function () {
                    banner.style.display = 'none';
                    localStorage.setItem('pwaClosed', 'true');
                });
                return;
            }
            window.addEventListener('beforeinstallprompt', function (e) {
                e.preventDefault();
                deferredPrompt = e;
                banner.style.display = 'block';
            });
            if (installBtn) {
                installBtn.addEventListener('click', async function () {
                    if (!deferredPrompt) return;
                    deferredPrompt.prompt();
                    await deferredPrompt.userChoice;
                    deferredPrompt = null;
                    banner.style.display = 'none';
                });
            }
            if (closeBtn) {
                closeBtn.addEventListener('click', function () {
                    banner.style.display = 'none';
                    localStorage.setItem('pwaClosed', 'true');
                });
            }
            window.addEventListener('appinstalled', function () {
                banner.style.display = 'none';
                deferredPrompt = null;
            });
        })();
    </script>

    <script>
        // Call the function
        window.getGeoLocation = () => {
            return new Promise((resolve, reject) => {
                // Check if browser supports Geolocation
                if (!navigator.geolocation) {
                    reject("Geolocation is not supported by your browser");
                    return;
                }

                // 1. THESE ARE THE KEY SETTINGS FROM YOUR HTML CODE
                const options = {
                    enableHighAccuracy: true, // Forces GPS usage
                    timeout: 10000,           // Waits up to 10 seconds
                    maximumAge: 0             // Forces a fresh reading (no cache)
                };

                // 2. Call getCurrentPosition with the options
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        // Success: Resolve with coordinates and accuracy
                        resolve({
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        });
                    },
                    (error) => {
                        // Error: Reject with message
                        reject(error.message);
                    },
                    options // <--- IMPORTANT: This must be passed here
                );
            });
        };
    </script>

    <script>

    <script>
        window.downloadFile = function (fileName, contentType, base64) {
            // Android WebView: delegate to native bridge which saves to Downloads folder
            if (window.AndroidBridge && typeof window.AndroidBridge.downloadFile === 'function') {
                window.AndroidBridge.downloadFile(fileName, contentType, base64);
                return;
            }
            // Web browser: use Blob URL (works in Chrome/Edge/Firefox, avoids data: URI limits)
            try {
                const byteChars = atob(base64);
                const byteArr = new Uint8Array(byteChars.length);
                for (let i = 0; i < byteChars.length; i++) byteArr[i] = byteChars.charCodeAt(i);
                const blob = new Blob([byteArr], { type: contentType });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(url), 2000);
            } catch (e) {
                console.error('downloadFile error:', e);
            }
        }
    </script>

        window.capturePhoto = () => {
            const video = document.getElementById('videoFeed');
            const canvas = document.getElementById('canvas');

            if (!video || !video.srcObject) {

    <script>
        window.stopVideo = () => {
            const video = document.getElementById('videoFeed');

            if (video && video.srcObject) {
                const stream = video.srcObject;

                // Stop all tracks (camera OFF)
                stream.getTracks().forEach(track => track.stop());

                // Remove stream reference
                video.srcObject = null;
            }
        };
    </script>
    <script>
        window.forceAppUpdate = async () => {

            console.log("ðŸ”¥ Manual refresh triggered");

            // ðŸ”¥ Clear all caches
            if ('caches' in window) {
                const keys = await caches.keys();
                await Promise.all(keys.map(key => caches.delete(key)));
            }

            // ðŸ”¥ Unregister service worker
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let reg of registrations) {
                    await reg.unregister();
                }
            }

            // ðŸ”¥ Hard reload (no cache)
            window.location.reload(true);
        };
    </script>
